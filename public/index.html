<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CF AI Chat Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #111;
      border-bottom: 1px solid #222;
      padding: 0.875rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #f6821f, #fbad41);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }

    header h1 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #f0f0f0;
      letter-spacing: -0.01em;
    }

    .model-badge {
      font-size: 0.7rem;
      color: #888;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 2px 7px;
    }

    #clear-btn {
      background: transparent;
      color: #666;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 0.4rem 0.85rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #clear-btn:hover { color: #e0e0e0; border-color: #444; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

    .empty-state {
      margin: auto;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: #444;
      user-select: none;
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 0.25rem;
    }

    .empty-state h2 { font-size: 1.1rem; font-weight: 600; color: #555; }
    .empty-state p  { font-size: 0.82rem; }

    .message-row {
      display: flex;
      gap: 0.625rem;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }

    .message-row.user { justify-content: flex-end; }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      margin-top: 2px;
    }

    .avatar.ai   { background: linear-gradient(135deg, #f6821f, #fbad41); color: #fff; }
    .avatar.user { background: #2a2a2a; color: #aaa; order: 2; }

    .bubble {
      padding: 0.7rem 1rem;
      border-radius: 14px;
      line-height: 1.6;
      font-size: 0.9rem;
      max-width: calc(100% - 44px);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      background: #f6821f;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble.ai {
      background: #1a1a1a;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #f6821f;
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .input-area {
      background: #111;
      border-top: 1px solid #222;
      padding: 0.875rem 1rem;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
      max-width: 780px;
      margin: 0 auto;
    }

    textarea {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
      color: #e0e0e0;
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 140px;
      overflow-y: auto;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: #f6821f55; }
    textarea::placeholder { color: #444; }

    #send-btn {
      background: #f6821f;
      color: #fff;
      border: none;
      border-radius: 10px;
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, opacity 0.15s;
    }

    #send-btn:hover:not(:disabled) { background: #e57418; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #send-btn svg { width: 16px; height: 16px; }

    .hint {
      text-align: center;
      font-size: 0.7rem;
      color: #333;
      margin-top: 0.4rem;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">CF</div>
    <h1>AI Chat Assistant</h1>
    <span class="model-badge">Llama 3.3 · Workers AI</span>
  </div>
  <button id="clear-btn" onclick="clearHistory()">Clear chat</button>
</header>

<div id="messages">
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">&#9889;</div>
    <h2>What can I help you with?</h2>
    <p>Powered by Llama 3.3 on Cloudflare Workers AI</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea
      id="msg-input"
      placeholder="Message..."
      rows="1"
      autofocus
    ></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled title="Send (Enter)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <p class="hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
</div>

<script>
  // Each browser tab gets a persistent session ID stored in localStorage.
  // This maps to a unique Durable Object instance on the server, which holds
  // that session's full conversation history in SQLite.
  let sessionId = localStorage.getItem('cf_chat_session');
  if (!sessionId) {
    sessionId = crypto.randomUUID();
    localStorage.setItem('cf_chat_session', sessionId);
  }

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('msg-input');
  const sendBtn    = document.getElementById('send-btn');

  let streaming = false;

  // Enable/disable send button based on input content
  inputEl.addEventListener('input', () => {
    sendBtn.disabled = !inputEl.value.trim() || streaming;
    // Auto-resize textarea
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function removeEmptyState() {
    const el = document.getElementById('empty-state');
    if (el) el.remove();
  }

  function appendMessage(role, text, withCursor = false) {
    const row = document.createElement('div');
    row.className = `message-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role === 'user' ? 'user' : 'ai'}`;
    avatar.textContent = role === 'user' ? 'You' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role === 'user' ? 'user' : 'ai'}`;
    bubble.textContent = text;

    if (withCursor) {
      const cur = document.createElement('span');
      cur.className = 'cursor';
      cur.id = 'stream-cursor';
      bubble.appendChild(cur);
    }

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || streaming) return;

    removeEmptyState();
    inputEl.value = '';
    inputEl.style.height = 'auto';
    streaming = true;
    sendBtn.disabled = true;

    appendMessage('user', text);

    // Placeholder bubble for streaming response
    const aiBubble = appendMessage('ai', '', true);

    try {
      const res = await fetch(`/api/chat?sessionId=${sessionId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Unknown error' }));
        aiBubble.textContent = 'Error: ' + err.error;
        return;
      }

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let   buf     = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop() ?? '';

        for (const line of lines) {
          if (!line.startsWith('data: ') || line.includes('[DONE]')) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if (data.response) {
              // Remove cursor, append token, re-add cursor
              const cur = document.getElementById('stream-cursor');
              if (cur) cur.remove();
              aiBubble.textContent += data.response;
              const newCur = document.createElement('span');
              newCur.className = 'cursor';
              newCur.id = 'stream-cursor';
              aiBubble.appendChild(newCur);
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          } catch { /* ignore malformed SSE lines */ }
        }
      }
    } catch (e) {
      aiBubble.textContent = 'Network error: ' + e.message;
    } finally {
      // Remove blinking cursor when done
      document.getElementById('stream-cursor')?.remove();
      streaming = false;
      sendBtn.disabled = !inputEl.value.trim();
      inputEl.focus();
    }
  }

  async function clearHistory() {
    if (!confirm('Clear all messages in this session?')) return;
    await fetch(`/api/history?sessionId=${sessionId}`, { method: 'DELETE' });
    messagesEl.innerHTML = `
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">&#9889;</div>
        <h2>What can I help you with?</h2>
        <p>Powered by Llama 3.3 on Cloudflare Workers AI</p>
      </div>`;
  }

  // On load, restore previous messages from the Durable Object
  async function loadHistory() {
    try {
      const res  = await fetch(`/api/history?sessionId=${sessionId}`);
      const msgs = await res.json();
      if (!msgs.length) return;
      removeEmptyState();
      msgs.forEach(m => appendMessage(m.role === 'user' ? 'user' : 'ai', m.content));
    } catch { /* non-fatal */ }
  }

  loadHistory();
</script>
</body>
</html>
